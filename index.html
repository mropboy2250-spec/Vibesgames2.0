<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibesGames 2.0 – Simple App Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <meta name="google-signin-client_id" content="YOUR_CLIENT_ID.apps.googleusercontent.com">
</head>
<body>
    <div id="app">
        <!-- Header with Theme Toggle -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-gamepad"></i> VibesGames <span class="version">2.0</span>
            </div>
            <div class="header-right">
                <button id="themeToggle" class="icon-btn">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="user-badge" id="userBadge">
                    <i class="fas fa-user-circle"></i>
                    <span id="userNameDisplay">Guest</span>
                </div>
            </div>
        </header>

        <!-- Featured Banner -->
        <div class="featured-banner" id="featuredBanner">
            <div class="featured-content">
                <h3 id="featuredTitle">⚡ Featured App</h3>
                <p id="featuredDesc">Check out our top pick!</p>
                <button id="featuredDownloadBtn" class="btn-small">Download</button>
            </div>
        </div>

        <!-- Search & Filter Bar -->
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search apps..." autocomplete="off">
            <select id="sortSelect">
                <option value="a-z">A-Z</option>
                <option value="z-a">Z-A</option>
                <option value="top-rated">Top Rated</option>
                <option value="newest">Newest First</option>
            </select>
        </div>

        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="top">Top Rated</button>
            <button class="filter-btn" data-filter="latest">Latest</button>
            <button class="filter-btn" data-filter="featured">Featured</button>
        </div>

        <!-- Main Content Area -->
        <main id="mainContent">
            <div class="apps-grid" id="appsGrid"></div>
        </main>

        <!-- Upload Section (Owner Only) -->
        <div id="uploadSection" class="upload-section hidden">
            <h3><i class="fas fa-cloud-upload-alt"></i> Upload New App (Owner Only)</h3>
            <form id="uploadForm">
                <input type="text" id="appName" placeholder="App Name" required>
                <select id="appCategory" required>
                    <option value="">Select Category</option>
                    <option value="Game">Game</option>
                    <option value="Tool">Tool</option>
                    <option value="Social">Social</option>
                    <option value="Education">Education</option>
                </select>
                <textarea id="appDesc" placeholder="Description" rows="3" required></textarea>
                <div class="file-row">
                    <label>Icon (optional):</label>
                    <input type="file" id="appIcon" accept="image/*">
                    <div id="iconPreview" class="icon-preview"></div>
                </div>
                <div class="file-row">
                    <label>APK/ZIP File (max 1GB simulated):</label>
                    <input type="file" id="appFile" accept=".apk,.zip" required>
                </div>
                <label class="checkbox">
                    <input type="checkbox" id="featuredCheck"> Mark as Featured
                </label>
                <button type="submit" class="btn">Upload App</button>
            </form>
        </div>

        <!-- Profile Section -->
        <div id="profileSection" class="profile-section hidden">
            <h2><i class="fas fa-user"></i> Your Profile</h2>
            <p><strong>Username:</strong> <span id="profileUsername"></span></p>
            <p><strong>Role:</strong> <span id="profileRole"></span></p>
            <div id="ownerAppsList">
                <h4>Your Uploaded Apps</h4>
                <div id="ownerAppsGrid" class="apps-grid small"></div>
            </div>
            <div id="downloadsList">
                <h4>My Downloads</h4>
                <ul id="downloadedApps"></ul>
            </div>
            <button id="logoutBtn" class="btn">Logout</button>
        </div>

        <!-- Login Modal -->
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Login</h2>
                <form id="loginForm">
                    <input type="text" id="loginUser" placeholder="Username" required>
                    <input type="password" id="loginPass" placeholder="Password" required>
                    <button type="submit" class="btn">Login</button>
                </form>
                <div class="google-login">
                    <p>or</p>
                    <button id="googleLoginBtn" class="btn google-btn">
                        <i class="fab fa-google"></i> Sign in with Google
                    </button>
                </div>
            </div>
        </div>

        <!-- App Detail Modal -->
        <div id="appModal" class="modal">
            <div class="modal-content wide">
                <span class="close">&times;</span>
                <div id="appDetailContent"></div>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <div class="footer-links">
                <a href="#" id="aboutLink">About</a>
                <a href="#" id="contactLink">Contact</a>
                <a href="#" id="privacyLink">Privacy Policy</a>
            </div>
            <p class="copyright">© 2025 VibesGames 2.0</p>
        </footer>
    </div>

    <!-- Toast Container -->
    <div id="toast" class="toast hidden">
        <span id="toastMessage"></span>
    </div>

    <!-- Loader -->
    <div id="loader" class="loader hidden">
        <div class="spinner"></div>
    </div>

    <script src="script.js"></script>
</body>
                        </html>
